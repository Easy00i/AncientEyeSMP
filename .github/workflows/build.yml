name: AncientEye SMP Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 3. Build with Maven (Clean Package)
      run: mvn -B clean package --file pom.xml

    - name: 4. Upload Single Jar File
      uses: actions/upload-artifact@v4
      with:
        name: AncientEyeSMP-Plugin
        # Hum sirf main jar ko target kar rahe hain, snapshot ko nahi
        path: target/AncientEyeSMP.jar
