name: AncientEyeSMP
version: 1.0
author: NotEasyOk

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  GENERAL SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
settings:
  prefix: "§8[§dAncientEye§8] §f"
  xp-per-kill: 10
  max-level: 3

  # Level-up XP thresholds
  level-xp:
    1: 100    # Level 1 → Level 2
    2: 250    # Level 2 → Level 3

  # Damage multipliers per level
  damage-multiplier:
    1: 1.0
    2: 1.2
    3: 1.5

  # Cooldown reduction per level (in seconds)
  cooldown-reduction-per-level: 2

  # Minimum cooldown allowed (seconds)
  min-cooldown: 2

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  NORMAL EYE COOLDOWNS  (in seconds)
#  Primary   = SHIFT + F
#  Secondary = SHIFT + Q
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
eyes:

  VOID:
    cooldown-primary:   10
    cooldown-secondary: 15

  PHANTOM:
    cooldown-primary:   12
    cooldown-secondary: 20

  STORM:
    cooldown-primary:   8
    cooldown-secondary: 20

  FROST:
    cooldown-primary:   12
    cooldown-secondary: 18

  FLAME:
    cooldown-primary:   12
    cooldown-secondary: 25

  SHADOW:
    cooldown-primary:   10
    cooldown-secondary: 22

  TITAN:
    cooldown-primary:   14
    cooldown-secondary: 20

  HUNTER:
    cooldown-primary:   10
    cooldown-secondary: 20

  GRAVITY:
    cooldown-primary:   12
    cooldown-secondary: 18

  WIND:
    cooldown-primary:   10
    cooldown-secondary: 18

  POISON:
    cooldown-primary:   12
    cooldown-secondary: 20

  LIGHT:
    cooldown-primary:   12
    cooldown-secondary: 22

  EARTH:
    cooldown-primary:   14
    cooldown-secondary: 22

  CRYSTAL:
    cooldown-primary:   14
    cooldown-secondary: 22

  ECHO:
    cooldown-primary:   12
    cooldown-secondary: 20

  RAGE:
    cooldown-primary:   14
    cooldown-secondary: 22

  SPIRIT:
    cooldown-primary:   16
    cooldown-secondary: 24

  TIME:
    cooldown-primary:   14
    cooldown-secondary: 20

  WARRIOR:
    cooldown-primary:   12
    cooldown-secondary: 20

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  EVENT EYE COOLDOWNS & ABILITY VALUES
#  These are the rarest and most powerful eyes.
#  All damage and radius values are also configurable here.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
event-eyes:

  METEOR:
    cooldown-primary:    30
    cooldown-secondary:  60
    primary-damage:      14.0
    primary-radius:      8
    secondary-count:     8       # Number of meteors in Meteor Shower
    secondary-damage:    6.0

  MIRAGE:
    cooldown-primary:    25
    cooldown-secondary:  45
    primary-damage:      4.0     # Per clone hit damage
    # secondary uses no damage value (escape ability)

  OCEAN:
    cooldown-primary:    15
    cooldown-secondary:  25
    primary-damage:      8.0
    primary-radius:      12
    secondary-damage:    6.0

  ECLIPSE:
    cooldown-primary:    20
    cooldown-secondary:  40
    primary-damage:      13.0
    primary-radius:      9
    # secondary is Shadow Phase (no damage)

  GUARDIAN:
    cooldown-primary:    20
    cooldown-secondary:  45
    # primary is Guardian Dome (no direct damage)
    secondary-damage:    15.0
    secondary-radius:    20

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  EVENT SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
event-settings:

  # Win animation duration (ticks — 200 = 10 seconds)
  win-animation-ticks: 200

  # Tasks pool — 3 random tasks are assigned to each player
  tasks:
    - "Kill 1 Player"
    - "Break 10 Diamonds"
    - "Survive 2 Minutes"
    - "Kill 20 Zombies"
    - "Fish 5 Items"
    - "Break 64 Iron Ore"
    - "Craft 1 Golden Apple"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TRADE SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
trade:
  # Maximum distance for trade request (blocks)
  max-distance: 100

  # Trade animation duration (ticks — 100 = 5 seconds)
  animation-ticks: 100

  # Trade request timeout (seconds)
  request-timeout: 30

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ANIMATION SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
animation:
  # SMP Ritual spin animation duration (ticks — 160 = 8 seconds)
  smp-spin-ticks: 160

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MESSAGES
#  Placeholders:
#    {time}   — cooldown seconds remaining
#    {type}   — eye type name
#    {task}   — task description
#    {player} — player name
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
messages:
  no-permission:  "§cYou do not have permission to use this command."
  cooldown-msg:   "§c§lCOOLDOWN §7— {time}s remaining"
  trade-success:  "§aTrade successful! Eye transferred."
  event-start:    "§6§lEVENT STARTED: §e§l{type} EYE"
  task-complete:  "§a§l✓ Task complete! §eNext: §f{task}"
  eye-bound:      "§5§l✨ {player} has successfully bound the {type} Eye!"
  no-eye:         "§cYou do not have an Eye bound to your soul."
  already-has-eye:"§cYou already have an Eye. Trade it away before getting a new one."
  eye-given:      "§a{type} Eye has been given to {player}."
  event-not-active: "§cNo event is currently active."
  invalid-eye:    "§cInvalid Eye type. Check spelling and try again."
  invalid-time:   "§cInvalid time format. Example: 10m, 1h30m, 90s"
